<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vanilla Unicorn Rechner</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #2a0022, #000);
    color: #ff4dd2;
    font-family: "Poppins", sans-serif;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-size: 38px;
    font-family: "Orbitron", sans-serif;
    letter-spacing: 3px;
    color: #ff4dd2;
    text-shadow:
        0 0 5px #ff00cc,
        0 0 15px #ff00cc,
        0 0 30px #ff00cc,
        0 0 60px #ff00cc;

    animation: flicker 3s infinite, pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { text-shadow: 0 0 10px #ff00cc, 0 0 25px #ff00cc; }
    50% { text-shadow: 0 0 20px #ff00cc, 0 0 60px #ff00cc; }
}

@keyframes flicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.4; }
    96% { opacity: 0.2; }
    97% { opacity: 1; }
}

h2 {
    color: #fff;
    font-size: 14px;
    opacity: 0.7;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 25px;
    gap: 30px;
}

.category {
    width: 92%;
    max-width: 950px;
    background: rgba(255, 0, 204, 0.05);
    border: 1px solid rgba(255, 0, 204, 0.2);
    border-radius: 16px;
    padding: 15px;
    backdrop-filter: blur(10px);
}

.category-title {
    font-size: 18px;
    margin-bottom: 10px;
    text-align: left;
    font-family: "Orbitron", sans-serif;
    color: #ff4dd2;
    text-shadow: 0 0 10px #ff00cc;
}

.items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
}

.item {
    padding: 12px;
    border-radius: 12px;
    background: rgba(255, 0, 204, 0.08);
    border: 1px solid rgba(255, 0, 204, 0.3);
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 10px rgba(255, 0, 204, 0.15);
    font-size: 14px;
}

.item:hover {
    transform: scale(1.05);
    box-shadow: 0 0 18px rgba(255, 0, 204, 0.6);
}

button {
    background: linear-gradient(90deg, #ff00cc, #ff4dd2);
    border: none;
    padding: 10px 18px;
    margin-top: 12px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    border-radius: 10px;
    margin-right: 6px;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff00cc;
}

.total {
    margin-top: 20px;
    font-size: 24px;
    font-family: "Orbitron", sans-serif;
}

textarea {
    width: 90%;
    height: 140px;
    margin-top: 18px;
    background: #0a0008;
    color: #00ff99;
    border: 1px solid #ff00cc;
    padding: 10px;
    border-radius: 10px;
    font-family: monospace;
}

.footer {
    margin-top: 20px;
    color: #666;
    font-size: 12px;
}
</style>
</head>

<body>

<h1>Vanilla Unicorn Rechner</h1>
<h2 id="date"></h2>

<div class="container" id="container"></div>

<div class="total">
💰 Gesamt: <span id="total">0</span>$
</div>

<button onclick="generateLog()">🧾 Log erstellen</button>
<button onclick="resetAll()">🔄 Reset</button>
<button onclick="undoAction()">↩️ Undo</button>

<textarea id="logOutput"></textarea>

<div class="footer">by Mason Milano</div>

<script>
const products = [
    {name: "Champagna", price: 5000, count: 0, cat: "Getränke"},
    {name: "Cum Shot", price: 4000, count: 0, cat: "Getränke"},
    {name: "Daddy´s Big Juice", price: 4500, count: 0, cat: "Getränke"},
    {name: "Mommy´s Juice", price: 4500, count: 0, cat: "Getränke"},
    {name: "Cola", price: 2500, count: 0, cat: "Getränke"},

    {name: "Bleed Burger", price: 1500, count: 0, cat: "Essen"},
    {name: "Titty Sandwich", price: 1500, count: 0, cat: "Essen"},
    {name: "Booty Cheesecake", price: 1500, count: 0, cat: "Essen"},
    {name: "Dicke Nüsse", price: 1500, count: 0, cat: "Essen"},
    {name: "Candy Dildo", price: 2000, count: 0, cat: "Essen"},

    {name: "Party Box", price: 10000, count: 0, cat: "Extra"}
];

let actionHistory = [];

const container = document.getElementById("container");
const totalDisplay = document.getElementById("total");

let displayedTotal = 0;

/* 🔊 SOUNDS */
const clickSound = new Audio("https://www.myinstants.com/media/sounds/click.mp3");
const hoverSound = new Audio("https://www.myinstants.com/media/sounds/mouse-hover.mp3");

/* 🔉 LAUTSTÄRKE (LEISER HOVER) */
clickSound.volume = 0.4;
hoverSound.volume = 0.15;

function play(sound) {
    sound.currentTime = 0;
    sound.play();
}

function updateDate() {
    const now = new Date();
    document.getElementById("date").innerText =
        "📅 " + now.toLocaleDateString() + " - " + now.toLocaleTimeString();
}
setInterval(updateDate, 1000);

function animateTotal(newTotal) {
    const diff = newTotal - displayedTotal;
    const step = diff / 20;

    let i = 0;
    const interval = setInterval(() => {
        displayedTotal += step;
        totalDisplay.innerText = Math.floor(displayedTotal);

        i++;
        if (i >= 20) {
            displayedTotal = newTotal;
            totalDisplay.innerText = newTotal;
            clearInterval(interval);
        }
    }, 20);
}

function render() {
    container.innerHTML = "";
    let total = 0;

    const categories = ["Getränke", "Essen", "Extra"];

    categories.forEach(cat => {
        const section = document.createElement("div");
        section.className = "category";

        const title = document.createElement("div");
        title.className = "category-title";
        title.innerText = cat;

        const itemsDiv = document.createElement("div");
        itemsDiv.className = "items";

        products.filter(p => p.cat === cat).forEach((p) => {
            total += p.price * p.count;

            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `
                <b>${p.name}</b><br>
                Preis: ${p.price}$<br>
                ${p.count}
            `;

            /* CLICK */
            div.onclick = () => {
                p.count++;
                actionHistory.push({ name: p.name, change: +1 });
                play(clickSound);
                render();
            };

            /* HOVER (IMMER) */
            div.onmouseenter = () => {
                hoverSound.currentTime = 0;
                hoverSound.play();
            };

            /* MOBILE TOUCH */
            div.ontouchstart = () => {
                hoverSound.currentTime = 0;
                hoverSound.play();
            };

            itemsDiv.appendChild(div);
        });

        section.appendChild(title);
        section.appendChild(itemsDiv);
        container.appendChild(section);
    });

    animateTotal(total);
}

function undoAction() {
    if (actionHistory.length === 0) return;

    const last = actionHistory.pop();
    const product = products.find(p => p.name === last.name);

    if (product) {
        product.count -= last.change;
        if (product.count < 0) product.count = 0;
    }

    render();
}

function generateLog() {
    let log = "📦 **Ausgaben:**\n";
    let totalMoney = 0;
    let totalItems = 0;

    products.forEach(p => {
        if (p.count > 0) {
            const sum = p.price * p.count;
            totalMoney += sum;
            totalItems += p.count;

            log += `- ${p.name} x${p.count} = ${sum}$\n`;
        }
    });

    log += `\n📊 Gesamt Artikel: ${totalItems}`;
    log += `\n💰 Gesamt Umsatz: ${totalMoney}$`;

    document.getElementById("logOutput").value = log;
}

function resetAll() {
    products.forEach(p => p.count = 0);
    actionHistory = [];
    render();
    document.getElementById("logOutput").value = "";
}

render();
</script>

</body>
</html>
