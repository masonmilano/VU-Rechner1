<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vanilla Unicorn Rechner</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #2a0022, #000);
    color: #ff4dd2;
    font-family: "Poppins", sans-serif;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-size: 38px;
    font-family: "Orbitron", sans-serif;
    letter-spacing: 3px;
    text-shadow: 0 0 20px #ff00cc;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 25px;
    gap: 30px;
}

.category {
    width: 92%;
    max-width: 950px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255, 0, 204, 0.3);
    border-radius: 16px;
    padding: 15px;
    backdrop-filter: blur(10px);
}

.category-title {
    font-size: 18px;
    margin-bottom: 10px;
    text-align: left;
    font-family: "Orbitron", sans-serif;
    color: #ff4dd2;
    text-shadow: 0 0 10px #ff00cc;
}

.items {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
}

.item {
    padding: 12px;
    border-radius: 12px;
    background: rgba(255, 0, 204, 0.08);
    border: 1px solid rgba(255, 0, 204, 0.3);
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 10px rgba(255, 0, 204, 0.15);
    font-size: 14px;
}

.item:hover {
    transform: scale(1.05);
    box-shadow: 0 0 18px rgba(255, 0, 204, 0.6);
}

button {
    background: linear-gradient(90deg, #ff00cc, #ff4dd2);
    border: none;
    padding: 10px 18px;
    margin-top: 12px;
    cursor: pointer;
    color: white;
    font-weight: 600;
    border-radius: 10px;
    margin-right: 6px;
}

.total {
    margin-top: 20px;
    font-size: 24px;
    font-family: "Orbitron", sans-serif;
}

textarea {
    width: 90%;
    height: 140px;
    margin-top: 18px;
    background: #0a0008;
    color: #00ff99;
    border: 1px solid #ff00cc;
    padding: 10px;
    border-radius: 10px;
    font-family: monospace;
}
</style>
</head>

<body>

<h1>Vanilla Unicorn Rechner</h1>

<div class="container" id="container"></div>

<div class="total">
💰 Gesamt: <span id="total">0</span>$
</div>

<button onclick="generateLog()">🧾 Log erstellen</button>
<button onclick="resetAll()">🔄 Reset</button>
<button onclick="undoAction()">↩️ Undo</button>

<textarea id="logOutput"></textarea>

<script>
const products = [
    {name: "Champagna", price: 5000, count: 0, cat: "Getränke"},
    {name: "Cum Shot", price: 4000, count: 0, cat: "Getränke"},
    {name: "Daddy's Big Juice", price: 4500, count: 0, cat: "Getränke"},
    {name: "Mommy's Juice", price: 4500, count: 0, cat: "Getränke"},
    {name: "Cola", price: 2500, count: 0, cat: "Getränke"},

    {name: "Bleed Burger", price: 1500, count: 0, cat: "Essen"},
    {name: "Titty Sandwich", price: 1500, count: 0, cat: "Essen"},
    {name: "Booty Cheesecake", price: 1500, count: 0, cat: "Essen"},
    {name: "Candy Dildo", price: 2000, count: 0, cat: "Essen"},
    {name: "Dicke Nüsse", price: 1500, count: 0, cat: "Essen"},

    {name: "Party Box", price: 10000, count: 0, cat: "Extra"}
];

let actionHistory = [];

const container = document.getElementById("container");
const totalDisplay = document.getElementById("total");

let displayedTotal = 0;

/* Render */
function render(){
    container.innerHTML = "";
    let total = 0;

    const categories = ["Getränke","Essen","Extra"];

    categories.forEach(cat=>{
        const section = document.createElement("div");
        section.className = "category";

        const title = document.createElement("div");
        title.className = "category-title";
        title.innerText = cat;

        const itemsDiv = document.createElement("div");
        itemsDiv.className = "items";

        products.filter(p=>p.cat===cat).forEach(p=>{
            total += p.price*p.count;

            const div = document.createElement("div");
            div.className = "item";
            div.innerHTML = `<b>${p.name}</b><br>${p.price}$<br>${p.count}`;

            div.onclick = ()=>{
                p.count++;
                actionHistory.push({name:p.name,change:1});
                render();
            };

            itemsDiv.appendChild(div);
        });

        section.appendChild(title);
        section.appendChild(itemsDiv);
        container.appendChild(section);
    });

    document.getElementById("total").innerText = total;
}

/* Undo */
function undoAction(){
    if(actionHistory.length===0)return;

    const last = actionHistory.pop();
    const p = products.find(x=>x.name===last.name);

    if(p){
        p.count -= last.change;
        if(p.count<0)p.count=0;
    }

    render();
}

/* Reset */
function resetAll(){
    products.forEach(p=>p.count=0);
    actionHistory=[];
    render();
    document.getElementById("logOutput").value="";
}

/* 🔥 CLEAN DISCORD LOG */
function generateLog(){
    let log = "🧾 VANILLA UNICORN - SHIFT REPORT\n";
    log += "────────────────────────\n\n";

    let total = 0;
    let totalItems = 0;

    const categories = ["Getränke","Essen","Extra"];

    categories.forEach(cat=>{
        let block = "";

        products.forEach(p=>{
            if(p.cat===cat && p.count>0){
                let sum = p.price*p.count;
                total += sum;
                totalItems += p.count;

                block += `• ${p.name} ×${p.count} → ${sum}$\n`;
            }
        });

        if(block!==""){
            log += `🍹 ${cat.toUpperCase()}\n`;
            log += block + "\n";
        }
    });

    log += "────────────────────────\n";
    log += `📦 Artikel gesamt: ${totalItems}\n`;
    log += `💰 Gesamt Umsatz: ${total}$`;

    document.getElementById("logOutput").value = log;
}

render();
</script>

</body>
</html>
